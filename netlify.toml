# Netlify: set site env vars in the dashboard (Site settings → Environment variables):
#   REACT_APP_SUPABASE_URL
#   REACT_APP_SUPABASE_ANON_KEY
# (Required for the app; same values as your local .env)

[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  CI = "false"
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

